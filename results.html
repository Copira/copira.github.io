<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Recommendations — United AI</title>
<style>
  :root {
    /* Exact pixel-matched color palette from your companion modules */
    --site-bg: #02133e;
    --card-bg: #001C42;
    --input-bg: #00122C;
    --accent: #00B2E2; /* United Cyan */
    --border: #1A365D;
    
    --text-main: #FFFFFF;
    --text-secondary: #A0B2C6;
    --text-muted: #647B95;

    /* Semantic validation colors tweaked slightly to look incredible against dark backgrounds */
    --green: #00CC66; 
    --green-light: rgba(0, 204, 102, 0.15);
    --amber: #FFB300; 
    --gold-light: rgba(255, 179, 0, 0.15);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    background: var(--site-bg); 
    color: var(--text-main); 
    font-size: 14px; 
    line-height: 1.5; 
  }

  /* Header customized to match the previous form styles perfectly */
  header { 
    background: var(--card-bg); 
    padding: 0 40px; 
    height: 56px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; border: 1.5px solid var(--accent); border-radius: 50%; position: relative; overflow: hidden; }
  .logo-mark::before { content:''; position:absolute; width:100%; height:1px; background:var(--accent); top:50%; }
  .logo-mark::after  { content:''; position:absolute; height:100%; width:1px; background:var(--accent); left:50%; }
  .logo-text { font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.2px; text-transform: uppercase; }
  .logo-text span { color: var(--accent); }
  
  .back-btn { 
    font-size: 12px; 
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-main); 
    text-decoration: none; 
    border: 1px solid var(--border); 
    padding: 8px 16px; 
    border-radius: 4px; 
    background: var(--input-bg);
    transition: border-color 0.2s, background 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); background: var(--card-bg); }

  .page { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; text-transform: uppercase; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

  /* Notification banner styled with your distinctive left-border accent look */
  .intro-bar { 
    font-size: 13px; 
    color: var(--text-secondary); 
    padding: 14px; 
    background: var(--input-bg); 
    border-left: 4px solid var(--accent); 
    border-radius: 0 4px 4px 0; 
    margin-bottom: 24px; 
    line-height: 1.6; 
  }

  .flight-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
  @media (max-width: 768px) { .flight-grid { grid-template-columns: 1fr; } }

  /* Premium Flight Cards matching your corporate panel theme */
  .fcard { 
    background: var(--card-bg); 
    border: 1px solid var(--border); 
    border-radius: 2px; 
    overflow: hidden; 
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    display: flex;
    flex-direction: column;
  }
  .fcard.risky    { border-top: 4px solid var(--amber); }
  .fcard.balanced { border-top: 4px solid var(--accent); }
  .fcard.safe     { border-top: 4px solid var(--green); }

  .fcard-head { padding: 16px; border-bottom: 1px solid var(--border); }
  .fcard-badge { 
    display: inline-block; 
    font-size: 10px; 
    font-weight: 700; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
    padding: 3px 8px; 
    border-radius: 3px; 
    margin-bottom: 10px; 
  }
  .risky    .fcard-badge { background: var(--gold-light);  color: var(--amber); }
  .balanced .fcard-badge { background: rgba(0, 178, 226, 0.15);  color: var(--accent); }
  .safe     .fcard-badge { background: var(--green-light); color: var(--green); }
  .fcard-num { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .fcard-aircraft { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .fcard-times { padding: 16px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); background: rgba(0, 18, 44, 0.2); }
  .ftime-block { flex: 1; }
  .ftime { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .fairport { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-weight: bold; }
  .fdur { text-align: center; font-size: 11px; color: var(--text-muted); min-width: 50px; }
  .fdur-line { height: 1px; background: var(--border); width: 36px; margin: 3px auto; }

  .fcard-facts { padding: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
  .fact { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; font-size: 13px; }
  .fact-label { color: var(--text-secondary); flex-shrink: 0; }
  .fact-val { font-weight: 600; text-align: right; }
  .fv-green { color: var(--green); }
  .fv-amber { color: var(--amber); }
  .fv-blue  { color: var(--accent); }
  
  .risk-note { 
    font-size: 12px; 
    color: var(--amber); 
    background: var(--gold-light); 
    padding: 10px; 
    border-radius: 4px; 
    margin-top: 4px; 
    line-height: 1.5; 
    border-left: 2px solid var(--amber);
  }

  .fcard-foot { padding: 16px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 18, 44, 0.2); }
  .fcard-price { font-size: 18px; font-weight: 700; color: #FFFFFF; }
  .fcard-conf { font-size: 11px; color: var(--text-secondary); }

  /* Standardizing interactive action links to look like custom action buttons */
  .book-link { 
    display: block; 
    margin: 0 16px 16px; 
    padding: 12px; 
    text-align: center; 
    border-radius: 4px; 
    font-size: 13px; 
    font-weight: 700; 
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-decoration: none; 
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  }
  .risky    .book-link { background: transparent; border: 1px solid var(--amber); color: var(--amber); }
  .risky    .book-link:hover { background: var(--amber); color: var(--card-bg); }
  .balanced .book-link { background: var(--accent); border: 1px solid var(--accent); color: var(--card-bg); }
  .balanced .book-link:hover { background: #FFFFFF; border-color: #FFFFFF; }
  .safe     .book-link { background: transparent; border: 1px solid var(--green); color: var(--green); }
  .safe     .book-link:hover { background: var(--green); color: var(--card-bg); }

  /* Bottom AI Explainer box */
  .reasoning { 
    background: var(--card-bg); 
    border: 1px solid var(--border); 
    border-radius: 2px; 
    padding: 24px; 
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }
  .reasoning-label { 
    font-size: 11px; 
    font-weight: 700; 
    letter-spacing: 1.5px; 
    text-transform: uppercase; 
    color: var(--accent); 
    margin-bottom: 12px; 
  }
  .reasoning p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
  .reasoning strong { color: #FFFFFF; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <span class="logo-text">United <span>AI</span></span>
  </div>
  <a class="back-btn" href="index.html">← Edit search</a>
</header>

<div class="page" id="page-content">
  <p style="color:var(--text-secondary); font-size:14px;">Loading recommendations…</p>
</div>

<script>
const TRANSIT = {
  ORD:'Blue Line → Loop: ~45 min', MDW:'Orange Line → Loop: ~30 min',
  LGA:'AirTrain + subway: ~55 min', EWR:'NJ Transit → Penn: ~30 min',
  JFK:'AirTrain + A train: ~60 min', SFO:'BART to Downtown: ~30 min',
  LAX:'FlyAway Bus: ~45 min', BOS:'Silver Line: ~25 min', DCA:'Metro Blue Line: ~20 min',
};

function rn() { return Math.floor(Math.random()*8000)+1000; }
function extractName(t) {
  const m = t.match(/(?:i['']m|my name is|i am)\s+([A-Z][a-z]+(?:\s+[A-Z]\.?)?)/i);
  return m ? m[1] : null;
}

window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  const origin  = (p.get('origin') || 'LGA').toUpperCase().trim();
  const dest    = (p.get('dest')   || 'ORD').toUpperCase().trim();
  const journey = p.get('journey') || '';
  const date    = p.get('date')    || 'Tomorrow';
  const arrive  = p.get('arrive')  || '';
  const toggles = (p.get('toggles') || '').split(',').map(s => s.trim());

  const hasCLEAR    = toggles.some(t => t.includes('clear'));
  const hasPrecheck = toggles.some(t => t.includes('precheck') || t.includes('tsa'));
  const hasChair    = toggles.some(t => t.includes('wheelchair'));

  const tsaFast = hasCLEAR ? '3–5 min (CLEAR)' : hasPrecheck ? '7–10 min (PreCheck)' : '22–35 min';
  const tsaMed  = hasCLEAR ? '3–5 min (CLEAR)' : hasPrecheck ? '8–14 min (PreCheck)' : '18–28 min';
  const tsaC    = (hasCLEAR||hasPrecheck) ? 'fv-green' : 'fv-amber';
  const transit = (TRANSIT[dest] || 'Transit to downtown: ~35 min') + (hasChair ? ' · Wheelchair assist at gate' : '');
  const name    = extractName(journey) || 'Traveler';
  const n1=rn(), n2=rn(), n3=rn();

  const flights = [
    { type:'risky',    label:'Fastest / Riskiest', num:`UA ${n1}`, aircraft:'B737-800',   dep:'5:55 AM', arr:'7:31 AM', dur:'2h 36m', tsa:tsaFast, tsaC, transit, ot:'74%', otC:'fv-amber', buf:'~14 min', price:'$219', conf:58, note:'Very tight — any delay risks missing the meeting.' },
    { type:'balanced', label:'Best Balance',        num:`UA ${n2}`, aircraft:'A320',       dep:'6:45 AM', arr:'8:22 AM', dur:'2h 37m', tsa:tsaMed,  tsaC, transit, ot:'88%', otC:'fv-green', buf:'~38 min', price:'$259', conf:84, note:null },
    { type:'safe',     label:'Safest',               num:`UA ${n3}`, aircraft:'B737 MAX 9', dep:'5:10 AM', arr:'6:47 AM', dur:'2h 37m', tsa:tsaFast, tsaC, transit, ot:'91%', otC:'fv-green', buf:'~73 min', price:'$299', conf:95, note:null },
  ];

  const secLabel = hasCLEAR ? 'CLEAR' : hasPrecheck ? 'PreCheck' : 'standard security';
  const transitShort = (TRANSIT[dest]||'transit').split(':')[0];

  const cards = ['risky','balanced','safe'].map(type => {
    const f = flights.find(x => x.type===type);
    return `
      <div class="fcard ${f.type}">
        <div class="fcard-head">
          <span class="fcard-badge">${f.label}</span>
          <div class="fcard-num">${f.num}</div>
          <div class="fcard-aircraft">${f.aircraft}</div>
        </div>
        <div class="fcard-times">
          <div class="ftime-block">
            <div class="ftime">${f.dep}</div>
            <div class="fairport">${origin}</div>
          </div>
          <div class="fdur"><div>${f.dur}</div><div class="fdur-line"></div><div>nonstop</div></div>
          <div class="ftime-block" style="text-align:right">
            <div class="ftime">${f.arr}</div>
            <div class="fairport">${dest}</div>
          </div>
        </div>
