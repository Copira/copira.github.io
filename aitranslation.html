<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>United Airlines Demo</title>
<style>
:root {
  /* Exact pixel-matched color palette from your companion modules */
  --site-bg: #02133e;
  --card-bg: #001C42;
  --input-bg: #00122C;
  --accent: #00B2E2; /* United Cyan */
  --border: #1A365D;
  
  --text-main: #FFFFFF;
  --text-secondary: #A0B2C6;
  --text-muted: #647B95;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  background: var(--site-bg); 
  color: var(--text-main);
  font-size: 14px;
  line-height: 1.5;
}

header { 
  background: var(--card-bg); 
  padding: 0 40px; 
  height: 56px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  border-bottom: 1px solid var(--border);
}

header strong {
  font-size: 15px; 
  font-weight: 700; 
  color: white; 
  letter-spacing: -0.2px; 
  text-transform: uppercase;
}

#langBox { 
  width: 280px;
  padding: 10px 14px;
  border: 1px solid var(--border); 
  background-color: var(--input-bg);
  color: var(--text-main);
  border-radius: 4px;
  font-size: 14px;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

#langBox:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(0, 178, 226, 0.4);
}

#langBox::placeholder {
  color: var(--text-muted);
}

.hero { 
  padding: 50px 24px; 
  background: linear-gradient(135deg, var(--card-bg), #002e6b); 
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  font-size: 26px; 
  font-weight: 700; 
  letter-spacing: -0.5px; 
  text-transform: uppercase;
}

.container { max-width: 1100px; margin: auto; padding: 0 24px; }

.card { 
  background: var(--card-bg); 
  margin-top: -30px; 
  padding: 30px; 
  border-radius: 2px; 
  box-shadow: 0 10px 30px rgba(0,0,0,.3);
  border-top: 6px solid var(--accent);
}

.card h2 {
  font-size: 11px; 
  font-weight: 700; 
  letter-spacing: 1.5px; 
  text-transform: uppercase; 
  color: var(--accent); 
  margin-bottom: 20px;
}

.flight { 
  background: var(--input-bg); 
  border: 1px solid var(--border);
  border-left: 5px solid var(--accent); 
  padding: 20px; 
  margin: 16px 0; 
  border-radius: 4px;
}

.flight h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text-main);
}

.flight div {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 2px;
}

button { 
  background: var(--accent); 
  color: var(--card-bg); 
  border: none; 
  padding: 12px 24px; 
  border-radius: 4px;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 10px;
  transition: background-color 0.2s ease, color 0.2s ease;
}

button:hover {
  background-color: var(--text-main);
  color: var(--card-bg);
}

.loading { 
  position: fixed; 
  inset: 0; 
  background: var(--site-bg); 
  color: var(--text-main);
  display: none; 
  justify-content: center; 
  align-items: center; 
  font-size: 24px; 
  font-weight: 700; 
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 9999; 
}
</style>
</head>
<body>

<div id="loading" class="loading">Loading Translation...</div>

<header>
  <div><strong>United Airlines</strong></div>
  <input id="langBox" placeholder="Type language to translate with AI">
</header>

<div class="hero">
  <div class="container">
    <h1 id="title"></h1>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2 id="featured"></h2>
    <div id="flights"></div>
  </div>
</div>

<script>
const languages={
en:{title:"Book Your Next Journey",featured:"Available Flights",duration:"Duration",price:"Price",select:"Select Flight"},
hi:{title:"अपनी अगली यात्रा बुक करें",featured:"उपलब्ध उड़ानें",duration:"अवधि",price:"कीमत",select:"उड़ान चुनें"},
braj:{title:"अपनी अगली यात्रा बुक करौ",featured:"उपलब्ध उड़ान",duration:"समय",price:"मूल्य",select:"उड़ान चुनौ"},
marwari:{title:"आपरी अगली यात्रा बुक करो",featured:"उपलब्ध उड़ानां",duration:"समय",price:"भाव",select:"उड़ान पसंद करो"}
};

const flights=[
{num:"UA101",route:"Newark (EWR) → London Heathrow (LHR)",duration:"7h 05m",price:"$599"},
{num:"UA115",route:"Newark (EWR) → London Heathrow (LHR)",duration:"7h 20m",price:"$649"},
{num:"UA205",route:"Chicago (ORD) → New Delhi (DEL)",duration:"14h 55m",price:"$829"},
{num:"UA312",route:"San Francisco (SFO) → New Delhi (DEL)",duration:"15h 40m",price:"$869"},
{num:"UA450",route:"Washington (IAD) → New Delhi (DEL)",duration:"13h 50m",price:"$819"}
];

function render(lang){
 const t=languages[lang] || languages.en;
 title.textContent=t.title;
 featured.textContent=t.featured;

 let out="";
 flights.forEach(f=>{
  out += `
  <div class="flight">
   <h3>${f.num}</h3>
   <div>${f.route}</div>
   <div>${t.duration}: ${f.duration}</div>
   <div>${t.price}: ${f.price}</div>
   <button>${t.select}</button>
  </div>`;
 });
 document.getElementById("flights").innerHTML=out;
}

render("en");

langBox.addEventListener("change",e=>{
 const v=e.target.value.trim().toLowerCase();
 const mapping={
   "english":"en",
   "hindi":"hi",
   "braj":"braj",
   "braj hindi":"braj",
   "marwari":"marwari",
   "marwari hindi":"marwari"
 };
 const lang=mapping[v] || "en";
 loading.style.display="flex";
 setTimeout(()=>{
   loading.style.display="none";
   render(lang);
 },3000);
});
</script>
</body>
</html>
